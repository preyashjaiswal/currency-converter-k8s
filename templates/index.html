<!DOCTYPE html>
<html>
<head>
    <title>Currency Converter - Kubernetes</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center;
        }
        .converter { 
            background: white; 
            padding: 2rem; 
            border-radius: 20px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            width: 100%; 
            max-width: 500px;
        }
        h1 { 
            text-align: center; 
            color: #333; 
            margin-bottom: 2rem; 
            font-size: 2rem;
        }
        .input-group { 
            margin-bottom: 1.5rem; 
        }
        label { 
            display: block; 
            margin-bottom: 0.5rem; 
            font-weight: bold; 
            color: #555;
        }
        input, select { 
            width: 100%; 
            padding: 1rem; 
            border: 2px solid #ddd; 
            border-radius: 10px; 
            font-size: 1.1rem;
            transition: border-color 0.3s;
        }
        input:focus, select:focus { 
            outline: none; 
            border-color: #667eea;
        }
        .swap-btn, .convert-btn { 
            width: 100%; 
            padding: 1rem; 
            border: none; 
            border-radius: 10px; 
            font-size: 1.1rem; 
            font-weight: bold; 
            cursor: pointer; 
            margin-bottom: 1rem;
            transition: transform 0.2s;
        }
        .swap-btn { 
            background: #f8f9fa; 
            color: #667eea; 
            border: 2px solid #667eea;
        }
        .convert-btn { 
            background: #667eea; 
            color: white;
        }
        .swap-btn:hover, .convert-btn:hover { 
            transform: translateY(-2px);
        }
        .result { 
            background: #f8f9fa; 
            padding: 1.5rem; 
            border-radius: 10px; 
            text-align: center; 
            margin-top: 1rem;
            font-size: 1.5rem; 
            font-weight: bold; 
            color: #333;
        }
        .error { background: #fee; color: #c33; border: 2px solid #fcc; }
        .loading { opacity: 0.7; }
    </style>
</head>
<body>
    <div class="converter">
        <h1>💱 Currency Converter</h1>
        <div class="input-group">
            <label>Amount:</label>
            <input type="number" id="amount" value="100" min="0" step="0.01">
        </div>
        <div style="display: flex; gap: 1rem;">
            <div class="input-group" style="flex: 1;">
                <label>From:</label>
                <select id="fromCurrency">USD</select>
            </div>
            <div style="align-self: end;">
                <button class="swap-btn" onclick="swapCurrencies()">↔ Swap</button>
            </div>
            <div class="input-group" style="flex: 1;">
                <label>To:</label>
                <select id="toCurrency">EUR</select>
            </div>
        </div>
        <button class="convert-btn" onclick="convertCurrency()">Convert Now</button>
        <div id="result" class="result" style="display: none;"></div>
    </div>

    <script>
        const API_BASE = '/api';  // Your Flask API endpoints
        
        // Load currencies on page load
        window.onload = function() {
            loadCurrencies();
        };
        
        async function loadCurrencies() {
            try {
                const response = await fetch(`${API_BASE}/rates?base=USD`);
                const data = await response.json();
                const currencies = Object.keys(data.rates || data);
                
                const fromSelect = document.getElementById('fromCurrency');
                const toSelect = document.getElementById('toCurrency');
                
                currencies.forEach(currency => {
                    const option1 = new Option(currency, currency);
                    const option2 = new Option(currency, currency);
                    fromSelect.add(option1);
                    toSelect.add(option2);
                });
            } catch (error) {
                console.error('Error loading currencies:', error);
            }
        }
        
        async function convertCurrency() {
            const amount = document.getElementById('amount').value;
            const from = document.getElementById('fromCurrency').value;
            const to = document.getElementById('toCurrency').value;
            
            const resultDiv = document.getElementById('result');
            const convertBtn = document.querySelector('.convert-btn');
            
            // Show loading
            resultDiv.className = 'result loading';
            convertBtn.textContent = 'Converting...';
            resultDiv.style.display = 'block';
            
            try {
                const response = await fetch(`${API_BASE}/convert?from=${from}&to=${to}&amount=${amount}`);
                const data = await response.json();
                
                if (data.result !== undefined) {
                    resultDiv.innerHTML = `
                        <div>${amount} ${from} = ${data.result.toLocaleString()} ${to}</div>
                        <div style="font-size: 0.9rem; opacity: 0.8;">
                            Rate: 1 ${from} = ${data.rate.toFixed(4)} ${to}
                        </div>
                    `;
                    resultDiv.className = 'result';
                } else {
                    throw new Error(data.error || 'Conversion failed');
                }
            } catch (error) {
                resultDiv.textContent = `Error: ${error.message}`;
                resultDiv.className = 'result error';
            } finally {
                convertBtn.textContent = 'Convert Now';
            }
        }
        
        function swapCurrencies() {
            const from = document.getElementById('fromCurrency').value;
            const to = document.getElementById('toCurrency').value;
            document.getElementById('fromCurrency').value = to;
            document.getElementById('toCurrency').value = from;
        }
    </script>
</body>
</html>
